key: juiceshop
name: OWASP Juice Shop
# Official, actively maintained image, boots ready (no install wizard):
#   docker run -d --name juiceshop -p 3000:3000 bkimminich/juice-shop
base_url: "http://localhost:3000"
description: >
  OWASP Juice Shop — a modern Angular single-page e-commerce app. Representative
  stateful Web UI with hash routing, dialogs, and a cookie/welcome banner; good
  stress test for both pipelines. Boots ready, which keeps runs reproducible.

# Pre-registered test account (create it once in the running Juice Shop). A shared
# test fixture, given IDENTICALLY to every pipeline: the login/basket stories
# (US-5/6/7) require an existing account, so without real credentials the model
# invents a non-existent login that always fails. Not a per-pipeline advantage.
username: "test@juice.sh"
password: "Test1234!"

# SINGLE start point for every pipeline (fair comparison): each strategy must
# discover deeper routes (login/register behind the account menu) on its own.
entry_paths:
  - "/#/"
  - "/#/search"

# Keep runs deterministic and away from CTF/admin areas.
avoid_url_substrings:
  - "#/administration"
  - "score-board"
  - "#/logout"
  - "#/complain"

# Blocking overlays the harness auto-dismisses (welcome dialog + cookie banner).
dismiss_selectors:
  - "#dismissWelcomeButton"
  - "a.cc-dismiss"

# First-visit overlays: pre-seed the dismissed state (localStorage + cookie)
# before page load so the welcome modal / cookie banner never appear — the
# modal otherwise marks the app aria-hidden and blocks role-based locators.
# Environment setup, applied identically to every pipeline.
predismiss_storage:
  welcomebanner_status: "dismiss"
  cookieconsent_status: "dismiss"

user_stories:
  - id: "US-1"
    title: "Produktsuche"
    text: >
      Als Besucher möchte ich über die Suchfunktion nach einem Produkt suchen,
      damit ich passende Artikel im Shop finde.
    acceptance_criteria:
      - "Über das Such-Icon im Header lässt sich ein Suchfeld öffnen."
      - "Eine Suche nach 'Apple' liefert eine Ergebnisliste mit Produktkacheln."
      - "Die Ergebnisse enthalten mindestens eine Produktkarte."
    # A passing test verifies US-1 iff it references the search toggle.
    key_elements: ["Open search"]

  - id: "US-2"
    title: "Produktdetails öffnen"
    text: >
      Als Besucher möchte ich die Detailansicht eines Produkts öffnen,
      damit ich Beschreibung und Preis sehe.
    acceptance_criteria:
      - "Ein Klick auf eine Produktkarte öffnet einen Detail-Dialog."
      - "Der Dialog zeigt Produktname und Preis."
      - "Der Dialog lässt sich wieder schließen."
    key_elements: ["Click for more information about the product"]

  - id: "US-3"
    title: "Konto registrieren"
    text: >
      Als neuer Nutzer möchte ich ein Kundenkonto anlegen,
      damit ich später einkaufen kann.
    acceptance_criteria:
      - "Die Registrierung ist über einen Link/Menüpunkt erreichbar."
      - "Pflichtfelder E-Mail, Passwort und Passwort-Wiederholung sind vorhanden."
      - "Eine Sicherheitsfrage muss ausgewählt werden."
    key_elements: ["Security Question"]

  # (US-4 „Cookie-/Willkommens-Banner schließen" entfernt: der gemeinsame
  #  Test-Harness setzt den Dismiss-Status vorab, sodass die Banner gar nicht
  #  erscheinen — die Story wäre damit strukturell nicht testbar.)

  - id: "US-5"
    title: "Anmelden"
    text: >
      Als registrierter Nutzer möchte ich mich mit E-Mail und Passwort anmelden,
      damit ich auf mein Konto zugreifen kann.
    acceptance_criteria:
      - "Setzt ein vorhandenes Kundenkonto voraus (Testkonto oder vorherige Registrierung)."
      - "Die Anmeldung ist über einen Link/Menüpunkt erreichbar."
      - "Die Formularfelder für E-Mail und Passwort sind vorhanden."
      - "Nach gültiger Eingabe wird der Nutzer angemeldet und zur Shop-Ansicht weitergeleitet."
      - "Der Header zeigt das Konto-Icon oder einen Account-Namen als Anmeldebestätigung."
    key_elements: ["Text field for the login email"]

  - id: "US-6"
    title: "Artikel in den Warenkorb legen"
    text: >
      Als Besucher möchte ich ein Produkt in den Warenkorb legen,
      damit ich es im Kaufprozess weiter verfolgen kann.
    # Hinweis: Juice Shops Warenkorb ist session-basiert und erfordert KEINE
    # Anmeldung (live verifiziert). Die frühere Login-Vorbedingung war sachlich
    # falsch und zwang jeden Warenkorb-Test unnötig durch den fehleranfälligen
    # Login-Flow — entfernt.
    acceptance_criteria:
      - "Der 'In den Warenkorb'-Button ist auf einer Produktkarte klickbar."
      - "Nach dem Klick erscheint eine Bestätigungsmeldung."
      - "Das Warenkorb-Icon im Header zeigt mindestens 1 Artikel an."
    key_elements: ["Add to Basket"]

  - id: "US-7"
    title: "Vollständiger Einkaufsprozess"
    text: >
      Als Besucher möchte ich ein Produkt suchen, dessen Detailseite
      öffnen und es in den Warenkorb legen, damit ich den Kaufprozess von der
      Suche bis zum Warenkorb ohne Unterbrechung durchlaufen kann.
    # Kein Login nötig (session-basierter Warenkorb, live verifiziert) — die
    # frühere Anmelde-Vorbedingung war sachlich falsch und entfernt.
    acceptance_criteria:
      - "Eine Suche nach 'Apple' liefert mindestens eine Produktkarte."
      - "Ein Klick auf die Produktkarte öffnet den Detail-Dialog mit Name und Preis."
      - "Über den Detail-Dialog lässt sich das Produkt in den Warenkorb legen."
      - "Der Warenkorb-Zähler im Header erhöht sich auf mindestens 1."
    # Full flow: ONE passing test must exercise both search and add-to-basket.
    key_elements: ["Open search", "Add to Basket"]
