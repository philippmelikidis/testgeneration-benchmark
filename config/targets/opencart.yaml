key: opencart
name: OpenCart Storefront
# Self-hosted recommended (Docker). The public demo at https://demo.opencart.com
# resets periodically and rate-limits, so prefer a local instance for reproducible runs.
base_url: "http://localhost:8080"
description: >
  Standard OpenCart demo storefront (default catalog). Used as a representative,
  stateful e-commerce web UI: search, product detail, cart, and guest checkout.

username: null
password: null

entry_paths:
  - "/"
  - "/index.php?route=product/search"

# Pages the crawler/agent should not wander into (keeps runs deterministic
# and avoids destructive admin actions).
avoid_url_substrings:
  - "route=account/logout"
  - "admin"
  - "index.php?route=checkout/checkout"  # only reached deliberately via US-3/US-7

user_stories:
  - id: "US-1"
    title: "Produktsuche"
    text: >
      Als Besucher möchte ich über die Suchleiste nach einem Produkt suchen,
      damit ich passende Artikel im Katalog finde.
    acceptance_criteria:
      - "Eine Suche nach 'MacBook' liefert eine Ergebnisliste."
      - "Mindestens ein Ergebnis enthält den Suchbegriff im Produktnamen."
      - "Die Ergebnisseite zeigt die verwendete Suchanfrage an."

  - id: "US-2"
    title: "Produkt in den Warenkorb legen"
    text: >
      Als Besucher möchte ich ein Produkt in den Warenkorb legen,
      damit ich es später kaufen kann.
    acceptance_criteria:
      - "Nach 'In den Warenkorb' erscheint eine Erfolgsmeldung."
      - "Der Warenkorb-Zähler im Header zeigt mindestens 1 Artikel."
      - "Die Warenkorb-Übersicht listet das hinzugefügte Produkt."

  - id: "US-3"
    title: "Gast-Checkout"
    text: >
      Als Besucher möchte ich als Gast zur Kasse gehen,
      damit ich ohne Konto eine Bestellung anstoßen kann.
    acceptance_criteria:
      - "Mit Artikel im Warenkorb ist der Checkout erreichbar."
      - "Die Gast-Checkout-Option lässt sich auswählen."
      - "Das Formular für Rechnungsdaten wird angezeigt."

  - id: "US-4"
    title: "Konto registrieren"
    text: >
      Als neuer Nutzer möchte ich ein Konto anlegen,
      damit ich meine Bestellungen verwalten kann.
    acceptance_criteria:
      - "Das Registrierungsformular ist über das Account-Menü erreichbar."
      - "Pflichtfelder (Vorname, Nachname, E-Mail) sind vorhanden."
      - "Nach gültiger Eingabe erscheint eine Bestätigungsseite."

  - id: "US-5"
    title: "Anmelden"
    text: >
      Als registrierter Nutzer möchte ich mich über das Account-Menü anmelden,
      damit ich meine Bestellungen und Kontodaten einsehen kann.
    acceptance_criteria:
      - "Das Login-Formular ist über das Account-Dropdown im Header erreichbar."
      - "Die Felder für E-Mail und Passwort sind vorhanden."
      - "Nach korrekter Eingabe wird die 'My Account'-Übersichtsseite angezeigt."
      - "Der Header bestätigt die Anmeldung durch den sichtbaren Account-Namen."

  - id: "US-6"
    title: "Warenkorb bearbeiten"
    text: >
      Als Besucher möchte ich Artikel aus dem Warenkorb entfernen,
      damit ich meine Auswahl vor dem Checkout anpassen kann.
    acceptance_criteria:
      - "Der Warenkorb ist über das Warenkorb-Icon im Header erreichbar."
      - "Jeder Artikel im Warenkorb hat einen 'Entfernen'-Button."
      - "Nach dem Entfernen wird der Warenkorb-Zähler im Header aktualisiert."
      - "Ein leerer Warenkorb zeigt eine entsprechende Hinweismeldung."

  - id: "US-7"
    title: "Vollständiger Einkaufsprozess"
    text: >
      Als Besucher möchte ich ein Produkt suchen, es in den Warenkorb legen
      und als Gast zur Kasse gehen, damit ich den gesamten Kaufprozess von der
      Suche bis zur Eingabe der Rechnungsdaten ohne Konto durchlaufen kann.
    acceptance_criteria:
      - "Eine Suche nach 'MacBook' liefert mindestens ein Produkt."
      - "Das Produkt lässt sich über 'In den Warenkorb' hinzufügen."
      - "Der Checkout ist über den Warenkorb erreichbar."
      - "Die Gast-Checkout-Option ist auswählbar."
      - "Das Formular für Rechnungsdaten wird nach Auswahl der Gast-Option angezeigt."
